<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="module" src="./js/guard.js"></script>
  <script src="./js/loader.js"></script>
  <!-- SEO -->
  <meta name="description" content="Join Sellnook for free and start buying or selling today.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://sellnook.com/signup">
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Sellnook">
  <meta property="og:title" content="Create an Account — Sellnook">
  <meta property="og:description" content="Join Sellnook for free and start buying or selling today.">
  <meta property="og:url" content="https://sellnook.com/signup">
  <meta property="og:image" content="https://sellnook.com/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@sellnook">
  <meta name="twitter:title" content="Create an Account — Sellnook">
  <meta name="twitter:description" content="Join Sellnook for free and start buying or selling today.">
  <meta name="twitter:image" content="https://sellnook.com/og-image.png">
<link rel="icon" type="image/png" href="/assets/logo.png">
<title>Sellnook — Create Account</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #fafaf9;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .card { 
    width: 100%; 
    max-width: 440px; 
    animation: up 0.6s cubic-bezier(0.16,1,0.3,1) both;
    background: #fff;
    padding: 40px;
    border-radius: 24px;
    border: 1px solid #e8e8e5;
    box-shadow: 0 10px 40px rgba(0,0,0,0.03);
  }
  @keyframes up { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  .logo { font-family:'Syne',sans-serif; font-size:1.25rem; font-weight:700; color:#1a1a1a; text-decoration:none; display:block; margin-bottom:48px; }
  .logo span { color:#e8734a; }
  h1 { font-family:'Syne',sans-serif; font-size:1.9rem; font-weight:700; letter-spacing:-0.8px; margin-bottom:8px; }
  .sub { font-size:0.875rem; color:#888; font-weight:300; margin-bottom:36px; }
  .btn-google { width:100%; display:flex; align-items:center; justify-content:center; gap:10px; padding:12px; background:#fff; border:1px solid #e0e0dc; border-radius:12px; font-family:'Inter',sans-serif; font-size:0.875rem; font-weight:500; color:#1a1a1a; cursor:pointer; transition:all 0.2s; margin-bottom:24px; }
  .btn-google:hover { border-color:#1a1a1a; background: #fafaf9; transform: translateY(-1px); }
  .google-icon { width:18px; height:18px; flex-shrink:0; }
  .divider { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background:#e8e8e5; }
  .divider span { font-size:0.75rem; color:#bbb; white-space:nowrap; }
  .form-group { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
  label { font-size:0.78rem; font-weight:500; color:#555; letter-spacing:0.2px; }
  input { background:#fff; border:1px solid #e0e0dc; border-radius:12px; padding:12px 14px; font-family:'Inter',sans-serif; font-size:0.875rem; color:#1a1a1a; outline:none; transition:all 0.15s; width:100%; }
  input:focus { border-color:#1a1a1a; box-shadow: 0 0 0 4px rgba(26, 26, 26, 0.05); }
  input.error { border-color:#e8734a; }
  input::placeholder { color:#ccc; }
  .btn-primary { width:100%; padding:13px; background:#1a1a1a; color:#fafaf9; border:none; border-radius:12px; font-family:'Syne',sans-serif; font-size:0.9rem; font-weight:500; cursor:pointer; transition:all 0.2s; margin-top:8px; }
  .btn-primary:hover { background:#333; transform: translateY(-1px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
  .btn-primary:active { transform:scale(0.99); }
  .btn-primary:disabled { background:#ccc; cursor:not-allowed; }
  .error-msg { display:none; font-size:0.8rem; color:#e8734a; margin-top:12px; text-align:center; font-weight: 500; }
  .error-msg.show { display:block; }
  .success-msg { display:none; font-size:0.8rem; color:#2d9e6b; margin-top:12px; text-align:center; font-weight: 500; }
  .success-msg.show { display:block; }
  .login-link { text-align:center; margin-top:28px; font-size:0.82rem; color:#888; }
  .login-link a { color:#e8734a; font-weight:600; text-decoration:none; }
  .login-link a:hover { text-decoration:underline; }
  .terms { font-size:0.72rem; color:#bbb; text-align:center; margin-top:20px; line-height:1.6; }
  .pw-rule { font-size:0.78rem; color:#bbb; display:flex; align-items:center; gap:8px; transition:color 0.2s; }
  .pw-rule.pass { color:#2d9e6b; }
  .pw-dot { font-size:0.7rem; width:14px; text-align:center; }
  @media (max-width:480px) {
    body { padding:24px 16px; align-items:flex-start; padding-top:40px; }
    h1 { font-size:1.6rem; }
    .logo { margin-bottom:32px; }
    .card { padding: 24px; border: none; box-shadow: none; background: transparent; }
  }
</style>
</head>
<body>
<div class="card">
  <a href="coming-soon" class="logo">sell<span>nook</span></a>
  <h1>Create account</h1>
  <p class="sub">Join Sellnook — it's free to get started.</p>

  <button class="btn-google" onclick="signUpWithGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

  <div class="divider"><span>or sign up with email</span></div>

  <div class="form-group">
    <label for="fullname">Full name</label>
    <input type="text" id="fullname" placeholder="Jane Doe">
  </div>
  <div class="form-group">
    <label for="email">Email address</label>
    <input type="email" id="email" placeholder="you@email.com">
  </div>
  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Min. 8 chars, uppercase, lowercase, number" oninput="checkPassword()">
  </div>

  <!-- Password strength hints -->
  <div id="pw-hints" style="display:none;margin-top:-8px;margin-bottom:16px;display:flex;flex-direction:column;gap:5px;">
    <div class="pw-rule" id="rule-length">
      <span class="pw-dot">○</span> At least 8 characters
    </div>
    <div class="pw-rule" id="rule-upper">
      <span class="pw-dot">○</span> One uppercase letter (A–Z)
    </div>
    <div class="pw-rule" id="rule-lower">
      <span class="pw-dot">○</span> One lowercase letter (a–z)
    </div>
    <div class="pw-rule" id="rule-number">
      <span class="pw-dot">○</span> One number (0–9)
    </div>
  </div>

  <!-- Terms agreement checkbox -->
  <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;margin-top:4px;">
    <input type="checkbox" id="agree-terms" style="width:16px;height:16px;margin-top:2px;accent-color:#1a1a1a;flex-shrink:0;cursor:pointer;">
    <label for="agree-terms" style="font-size:0.78rem;color:#555;line-height:1.6;cursor:pointer;font-weight:400;text-transform:none;letter-spacing:0;">
      I agree to Sellnook's <a href="terms" target="_blank" style="color:#1a1a1a;font-weight:600;text-decoration:underline;">Terms of Service</a> and <a href="privacy" target="_blank" style="color:#1a1a1a;font-weight:600;text-decoration:underline;">Privacy Policy</a>
    </label>
  </div>

  <div class="error-msg" id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>

  <button class="btn-primary" id="submit-btn" onclick="signUpWithEmail()">Create account</button>

  <p class="login-link">Already have an account? <a href="login">Log in</a></p>
</div>

<!-- Firebase SDKs -->
<script type="module">
  import { auth, db, API } from "/js/config.js";
import { createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, updateProfile, sendEmailVerification, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const provider = new GoogleAuthProvider();

  // Redirect if already logged in (and verified)
  onAuthStateChanged(auth, user => {
    if (user && user.emailVerified) window.location.href = 'dashboard';
  });

  // Google sign up
  window.signUpWithGoogle = async function() {
    if (!document.getElementById('agree-terms').checked) {
      showError('Please agree to the Terms of Service and Privacy Policy to continue.');
      return;
    }
    try {
      const result = await signInWithPopup(auth, provider);
      window.location.href = 'dashboard';
    } catch (e) {
      showError(e.message);
    }
  };

  // Email/password sign up
  window.signUpWithEmail = async function() {
    const name     = document.getElementById('fullname').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const agreed   = document.getElementById('agree-terms').checked;
    const btn      = document.getElementById('submit-btn');

    if (!name)                return highlight('fullname');
    if (!email.includes('@')) return highlight('email');

    const pwValid = validatePassword(password);
    if (!pwValid) {
      highlight('password');
      document.getElementById('pw-hints').style.display = 'flex';
      return;
    }

    if (!agreed) {
      showError('Please agree to the Terms of Service and Privacy Policy to continue.');
      document.getElementById('agree-terms').focus();
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Creating account...';

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
      await sendEmailVerification(cred.user);

      // Send welcome email via backend
      try {
        await fetch('https://sellnook-backend.onrender.com/api/email/welcome', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, name })
        });
      } catch (e) { console.error('Welcome email error:', e); }
      // Show verify email screen instead of redirecting
      document.querySelector('.card').innerHTML = `
        <a href="coming-soon" class="logo">sell<span style="color:#e8734a">nook</span></a>
        <div style="text-align:center;padding:20px 0;">
          <div style="font-size:3rem;margin-bottom:20px;">📧</div>
          <h1 style="font-family:Syne,sans-serif;font-size:1.6rem;font-weight:700;letter-spacing:-0.5px;margin-bottom:12px;">Check your inbox</h1>
          <p style="font-size:0.875rem;color:#888;line-height:1.6;margin-bottom:28px;">We sent a verification link to <strong style="color:#1a1a1a;">${email}</strong>. Click the link to activate your account.</p>
          <button onclick="resendVerification()" style="background:transparent;border:1px solid #e0e0dc;border-radius:8px;padding:11px 20px;font-family:Inter,sans-serif;font-size:0.82rem;color:#888;cursor:pointer;width:100%;margin-bottom:12px;">Resend verification email</button>
          <a href="login" style="display:block;text-align:center;font-size:0.82rem;color:#1a1a1a;font-weight:500;text-decoration:none;margin-top:8px;">Go to login →</a>
          <div id="resend-msg" style="font-size:0.78rem;color:#2d9e6b;margin-top:12px;display:none;">Resent! Check your inbox.</div>
        </div>
      `;
      window._verifyUser = cred.user;
    } catch (e) {
      let msg = e.message;
      if (e.code === 'auth/email-already-in-use') msg = 'An account with this email already exists.';
      if (e.code === 'auth/weak-password')        msg = 'Password must be at least 8 characters.';
      showError(msg);
      btn.disabled    = false;
      btn.textContent = 'Create account';
    }
  };

  window.resendVerification = async function() {
    if (window._verifyUser) {
      await sendEmailVerification(window._verifyUser);
      const msg = document.getElementById('resend-msg');
      if (msg) { msg.style.display = 'block'; setTimeout(() => msg.style.display = 'none', 4000); }
    }
  };

  function validatePassword(pw) {
    return pw.length >= 8 &&
      /[A-Z]/.test(pw) &&
      /[a-z]/.test(pw) &&
      /[0-9]/.test(pw);
  }

  window.checkPassword = function() {
    const pw = document.getElementById('password').value;
    const hints = document.getElementById('pw-hints');
    hints.style.display = 'flex';

    function setRule(id, pass) {
      const el = document.getElementById(id);
      el.classList.toggle('pass', pass);
      el.querySelector('.pw-dot').textContent = pass ? '✓' : '○';
    }

    setRule('rule-length', pw.length >= 8);
    setRule('rule-upper',  /[A-Z]/.test(pw));
    setRule('rule-lower',  /[a-z]/.test(pw));
    setRule('rule-number', /[0-9]/.test(pw));
  };

  function highlight(id) {
    const el = document.getElementById(id);
    el.classList.add('error');
    el.focus();
    setTimeout(() => el.classList.remove('error'), 1500);
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('success-msg').classList.remove('show');
  }

  function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('error-msg').classList.remove('show');
  }
</script>
</body>
</html>
