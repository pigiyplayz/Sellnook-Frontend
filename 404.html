<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/assets/logo.png">
  <script src="/js/loader.js"></script>
  <title>Sellnook — Page Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#fafaf9; color:#1a1a1a; min-height:100vh; display:flex; flex-direction:column; overflow-x:hidden; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

    nav { border-bottom:1px solid #e8e8e5; padding:0 40px; height:64px; display:flex; align-items:center; background:#fafaf9; backdrop-filter:blur(20px); position:sticky; top:0; z-index:100; justify-content:center; }
    .nav-content { width:100%; max-width:1100px; display:flex; align-items:center; justify-content:space-between; }
    .logo { font-family:'Syne',sans-serif; font-size:1.25rem; font-weight:700; color:#1a1a1a; text-decoration:none; display:flex; align-items:center; gap:8px; }
    .logo span { color:#e8734a; }
    .logo img { height:32px; width:auto; }

    .page { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:64px 24px; animation:fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) both; position:relative; z-index:1; }

    /* 404 number */
    .four-oh-four { font-family:'Syne',sans-serif; font-size:clamp(5rem,15vw,10rem); font-weight:700; letter-spacing:-4px; line-height:1; position:relative; display:inline-block; user-select:none; margin-bottom:16px; color:rgba(26,26,26,0.06); }

    /* Headline */
    h1 { font-family:'Syne',sans-serif; font-size:clamp(1.5rem,4vw,2.5rem); font-weight:700; letter-spacing:-0.5px; margin-bottom:16px; color:#1a1a1a; }

    /* Description */
    .description { font-size:1rem; color:#888; line-height:1.6; max-width:480px; margin-bottom:48px; font-weight:400; }

    /* Navigation Card */
    .nav-card { background:#fff; border:1px solid #e8e8e5; border-radius:16px; padding:32px; max-width:600px; width:100%; display:flex; flex-direction:column; gap:24px; box-shadow:0 4px 24px rgba(0,0,0,0.04); }

    .nav-card-title { font-size:0.875rem; font-weight:600; color:#888; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }

    .suggestions { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .suggestion { display:flex; align-items:center; padding:14px 20px; background:#fafaf9; border:1px solid #e8e8e5; border-radius:10px; font-size:0.9rem; color:#1a1a1a; text-decoration:none; transition:all 0.2s; font-weight:500; text-align:left; }
    .suggestion:hover { background:rgba(232,115,74,0.06); border-color:rgba(232,115,74,0.2); transform:translateY(-2px); }
    .suggestion-icon { margin-right:12px; color:#ccc; font-size:1.1rem; }

    /* Main button */
    .btn-home { display:inline-flex; align-items:center; justify-content:center; gap:10px; padding:16px 32px; background:#e8734a; color:#fff; border-radius:10px; font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:700; text-decoration:none; transition:all 0.2s; width:100%; margin-top:8px; }
    .btn-home:hover { background:#f07d55; transform:translateY(-2px); box-shadow:0 12px 24px rgba(232,115,74,0.25); }

    .footer-note { margin-top:48px; font-size:0.8rem; color:#bbb; font-weight:300; }
    .footer-note a { color:#888; text-decoration:none; font-weight:500; border-bottom:1px solid #e8e8e5; transition:all 0.2s; }
    .footer-note a:hover { color:#e8734a; border-bottom-color:#e8734a; }

    @media (max-width:768px) {
      nav { padding:0 24px; }
      .page { padding:48px 20px; }
      .suggestions { grid-template-columns:1fr; }
      .four-oh-four { letter-spacing:-2px; }
      .nav-card { padding:24px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-content">
    <a href="/coming-soon.html" class="logo">
      <img src="/assets/logo.png" alt="Sellnook">
      sell<span>nook</span>
    </a>
  </div>
</nav>

<div class="page">
  <div class="four-oh-four">404</div>

  <h1>Page Not Found</h1>

  <p class="description">
    The page you are looking for has been moved, removed, renamed, or might never have existed.
  </p>

  <div class="nav-card">
    <div class="nav-card-title">Helpful Links</div>
    <div class="suggestions">
      <a href="/dashboard.html" class="suggestion">
        <span class="suggestion-icon">📊</span>
        Dashboard
      </a>
      <a href="/browse.html" class="suggestion">
        <span class="suggestion-icon">🛍️</span>
        Marketplace
      </a>
      <a href="/seller-dashboard.html" class="suggestion">
        <span class="suggestion-icon">📦</span>
        Seller Hub
      </a>
      <a href="/buyer-handbook.html" class="suggestion">
        <span class="suggestion-icon">📖</span>
        Help Center
      </a>
    </div>

    <a href="/coming-soon.html" class="btn-home">Return to Home</a>
  </div>

  <p class="footer-note">
    Need assistance? <a href="mailto:support@sellnook.com">Contact Support</a>
  </p>
</div>

</body>
</html>
