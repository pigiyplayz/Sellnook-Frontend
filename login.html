<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- SEO -->
  <meta name="description" content="Log in to your Sellnook account.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://sellnook.com/login">
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Sellnook">
  <meta property="og:title" content="Log In — Sellnook">
  <meta property="og:description" content="Log in to your Sellnook account.">
  <meta property="og:url" content="https://sellnook.com/login">
  <meta property="og:image" content="https://sellnook.com/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@sellnook">
  <meta name="twitter:title" content="Log In — Sellnook">
  <meta name="twitter:description" content="Log in to your Sellnook account.">
  <meta name="twitter:image" content="https://sellnook.com/og-image.png">
<link rel="icon" type="image/png" href="/assets/logo.png">
<title>Sellnook — Log In</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family:'Inter',sans-serif; background:#fafaf9; color:#1a1a1a; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 24px; }
  .card { 
    width:100%; 
    max-width:420px; 
    animation:up 0.6s cubic-bezier(0.16,1,0.3,1) both;
    background: #fff;
    padding: 40px;
    border-radius: 24px;
    border: 1px solid #e8e8e5;
    box-shadow: 0 10px 40px rgba(0,0,0,0.03);
  }
  @keyframes up { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  .logo { font-family:'Syne',sans-serif; font-size:1.25rem; font-weight:700; color:#1a1a1a; text-decoration:none; display:block; margin-bottom:48px; }
  .logo span { color:#e8734a; }
  h1 { font-family:'Syne',sans-serif; font-size:1.9rem; font-weight:700; letter-spacing:-0.8px; margin-bottom:8px; }
  .sub { font-size:0.875rem; color:#888; font-weight:300; margin-bottom:36px; }
  .btn-google { width:100%; display:flex; align-items:center; justify-content:center; gap:10px; padding:12px; background:#fff; border:1px solid #e0e0dc; border-radius:12px; font-family:'Inter',sans-serif; font-size:0.875rem; font-weight:500; color:#1a1a1a; cursor:pointer; transition:all 0.2s; margin-bottom:24px; }
  .btn-google:hover { border-color:#1a1a1a; background: #fafaf9; transform: translateY(-1px); }
  .google-icon { width:18px; height:18px; flex-shrink:0; }
  .divider { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background:#e8e8e5; }
  .divider span { font-size:0.75rem; color:#bbb; white-space:nowrap; }
  .form-group { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
  .label-row { display:flex; justify-content:space-between; align-items:center; }
  label { font-size:0.78rem; font-weight:500; color:#555; }
  .forgot { font-size:0.75rem; color:#888; text-decoration:none; cursor:pointer; background:none; border:none; font-family:'Inter',sans-serif; }
  .forgot:hover { color:#1a1a1a; text-decoration: underline; }
  input { background:#fff; border:1px solid #e0e0dc; border-radius:12px; padding:12px 14px; font-family:'Inter',sans-serif; font-size:0.875rem; color:#1a1a1a; outline:none; transition:all 0.15s; width:100%; }
  input:focus { border-color:#1a1a1a; box-shadow: 0 0 0 4px rgba(26, 26, 26, 0.05); }
  input.error { border-color:#e8734a; }
  input::placeholder { color:#ccc; }
  .btn-primary { width:100%; padding:13px; background:#1a1a1a; color:#fafaf9; border:none; border-radius:12px; font-family:'Syne',sans-serif; font-size:0.9rem; font-weight:500; cursor:pointer; transition:all 0.2s; margin-top:8px; }
  .btn-primary:hover { background:#333; transform: translateY(-1px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
  .btn-primary:active { transform:scale(0.99); }
  .btn-primary:disabled { background:#ccc; cursor:not-allowed; }
  .error-msg { display:none; font-size:0.8rem; color:#e8734a; margin-top:12px; text-align:center; font-weight: 500; }
  .error-msg.show { display:block; }
  .success-msg { display:none; font-size:0.8rem; color:#2d9e6b; margin-top:12px; text-align:center; font-weight: 500; }
  .success-msg.show { display:block; }
  .signup-link { text-align:center; margin-top:28px; font-size:0.82rem; color:#888; }
  .signup-link a { color:#e8734a; font-weight:600; text-decoration:none; }
  .signup-link a:hover { text-decoration:underline; }
  /* Modal */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:100; align-items:center; justify-content:center; padding:24px; backdrop-filter: blur(4px); }
  .modal-overlay.show { display:flex; }
  .modal { background:#fff; border-radius:24px; padding:32px; width:100%; max-width:380px; animation:modalUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
  @keyframes modalUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .modal h2 { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:700; margin-bottom:8px; }
  .modal p { font-size:0.82rem; color:#888; margin-bottom:20px; line-height: 1.5; }
  .modal-btns { display:flex; gap:8px; margin-top:16px; }
  .btn-cancel { flex:1; padding:11px; background:transparent; border:1px solid #e0e0dc; border-radius:12px; font-family:'Inter',sans-serif; font-size:0.875rem; cursor:pointer; color:#888; transition: all 0.2s; }
  .btn-cancel:hover { border-color:#1a1a1a; color:#1a1a1a; }
  .btn-send { flex:1; padding:11px; background:#1a1a1a; color:#fafaf9; border:none; border-radius:12px; font-family:'Syne',sans-serif; font-size:0.875rem; font-weight:500; cursor:pointer; transition: all 0.2s; }
  .btn-send:hover { background:#333; }
  @media (max-width:480px) {
    body { padding:24px 16px; align-items:flex-start; padding-top:40px; }
    h1 { font-size:1.6rem; }
    .logo { margin-bottom:32px; }
    .card { padding: 24px; border: none; box-shadow: none; background: transparent; }
  }
</style>
</head>
<body>
<div class="card">
  <a href="coming-soon" class="logo">sell<span>nook</span></a>
  <h1>Welcome back</h1>
  <p class="sub">Log in to your Sellnook account.</p>

  <button class="btn-google" onclick="loginWithGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

  <div class="divider"><span>or log in with email</span></div>

  <div class="form-group">
    <label for="email">Email address</label>
    <input type="email" id="email" placeholder="you@email.com">
  </div>
  <div class="form-group">
    <div class="label-row">
      <label for="password">Password</label>
      <button class="forgot" onclick="openForgot()">Forgot password?</button>
    </div>
    <input type="password" id="password" placeholder="••••••••">
  </div>

  <div class="error-msg" id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>

  <button class="btn-primary" id="login-btn" onclick="loginWithEmail()">Log in</button>
  <p class="signup-link">Don't have an account? <a href="signup">Sign up</a></p>
</div>

<!-- Forgot Password Modal -->
<div class="modal-overlay" id="forgot-modal">
  <div class="modal">
    <h2>Reset password</h2>
    <p>Enter your email and we'll send you a reset link.</p>
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="reset-email" placeholder="you@email.com">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeForgot()">Cancel</button>
      <button class="btn-send" onclick="sendReset()">Send link</button>
    </div>
  </div>
</div>

<script type="module">
  import { auth, db, API } from "/js/config.js";

  import { signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { doc, setDoc, serverTimestamp }                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const provider = new GoogleAuthProvider();

  // Redirect if already logged in
  onAuthStateChanged(auth, user => {
    if (user) window.location.href = 'dashboard';
  });

  async function saveUserToFirestore(user) {
    await setDoc(doc(db, 'users', user.uid), {
      uid:      user.uid,
      name:     user.displayName || '',
      email:    user.email,
      photoURL: user.photoURL || '',
      lastLogin: serverTimestamp()
    }, { merge: true });

    // Trigger security notification email
    try {
      await fetch(`${API}/api/email/login-notify`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          email:    user.email,
          name:     user.displayName || user.email.split('@')[0],
          device:   navigator.userAgent.split(')')[0].split('(')[1] || 'Unknown device',
          location: 'New sign-in'
        })
      });
    } catch (e) { console.error('Login notify error:', e); }
  }

  window.loginWithGoogle = async function() {
    try {
      const result = await signInWithPopup(auth, provider);
      await saveUserToFirestore(result.user);
      window.location.href = 'dashboard';
    } catch (e) {
      showError(e.message);
    }
  };

  window.loginWithEmail = async function() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('login-btn');

    if (!email.includes('@')) return highlight('email');
    if (!password)             return highlight('password');

    btn.disabled    = true;
    btn.textContent = 'Logging in...';

    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      await saveUserToFirestore(cred.user);
      window.location.href = 'dashboard';
    } catch (e) {
      let msg = 'Invalid email or password.';
      if (e.code === 'auth/too-many-requests') msg = 'Too many attempts. Please try again later.';
      showError(msg);
      btn.disabled    = false;
      btn.textContent = 'Log in';
    }
  };

  window.sendReset = async function() {
    const email = document.getElementById('reset-email').value.trim();
    if (!email.includes('@')) return;
    try {
      await sendPasswordResetEmail(auth, email);
      closeForgot();
      showSuccess('Reset link sent — check your inbox!');
    } catch (e) {
      showError('Could not send reset email. Check the address and try again.');
    }
  };

  window.openForgot  = () => document.getElementById('forgot-modal').classList.add('show');
  window.closeForgot = () => document.getElementById('forgot-modal').classList.remove('show');

  function highlight(id) {
    const el = document.getElementById(id);
    el.classList.add('error');
    el.focus();
    setTimeout(() => el.classList.remove('error'), 1500);
  }

  function showError(msg) {
    document.getElementById('error-msg').textContent = msg;
    document.getElementById('error-msg').classList.add('show');
    document.getElementById('success-msg').classList.remove('show');
  }

  function showSuccess(msg) {
    document.getElementById('success-msg').textContent = msg;
    document.getElementById('success-msg').classList.add('show');
    document.getElementById('error-msg').classList.remove('show');
  }
</script>
</body>
</html>
