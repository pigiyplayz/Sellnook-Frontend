<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sellnook Loading Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=Inter:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e8734a;
            --bg: #ffffff;
            --text: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafaf9;
            font-family: 'Inter', sans-serif;
        }

        /* The Custom Loader Container */
        .loader-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* The Logo Animation */
        .logo-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 24px;
            perspective: 1000px;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            animation: float 2s ease-in-out infinite;
            filter: drop-shadow(0 15px 15px rgba(232, 115, 74, 0.15));
        }

        /* The "Nook" Glow Pulse */
        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--primary);
            opacity: 0;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
            z-index: -1;
        }

        /* Progress Text */
        .loading-text {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
            opacity: 0.8;
            margin-bottom: 8px;
        }

        .loading-dots {
            display: flex;
            gap: 4px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            animation: dot-flow 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        /* KEYFRAMES */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotateX(0deg); }
            50% { transform: translateY(-15px) rotateX(5deg); }
        }

        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
        }

        @keyframes dot-flow {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Background texture for premium feel */
        .bg-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--primary) 0.5px, transparent 0.5px);
            background-size: 32px 32px;
            opacity: 0.05;
            z-index: -2;
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <div class="loader-wrapper">
        <div class="logo-container">
            <div class="pulse-ring"></div>
            <!-- Using your logo.png from the local assets folder -->
            <img src="./assets/logo.png" alt="Sellnook" class="logo-img" id="demo-logo">
        </div>
        
        <div class="loading-text">Unboxing your experience</div>
        
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot:nth-child(2)"></div>
            <div class="dot:nth-child(3)"></div>
        </div>
    </div>

    <script>
        // If they open this outside the downloads folder, we provide a backup visual
        const logo = document.getElementById('demo-logo');
        logo.onerror = function() {
            // Fallback if the real logo isn't found during direct file viewing
            this.style.display = 'none';
            const nook = document.createElement('div');
            nook.style.fontSize = '4rem';
            nook.innerHTML = '📦';
            logo.parentNode.appendChild(nook);
        };
    </script>
</body>
</html>
